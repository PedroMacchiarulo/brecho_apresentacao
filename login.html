<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Brechó Esqueci no Cabide</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="page-login">

    <main>
        <div class="form-container" style="margin-top: 100px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="color: var(--secondary-color); font-size: 2rem;">🌿 Acesso Gestor</h1>
                <p>Entre para gerenciar seu estoque tropical</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar no Painel</button>
                <div style="text-align: center; margin-top: 20px;">
                    <a href="index.html" style="color: #888; text-decoration: none; font-size: 0.9rem;">Voltar para a vitrine</a>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/main.js"></script>
</body>
</html>
