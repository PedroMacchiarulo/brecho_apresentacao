<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine - Brechó Esqueci no Cabide</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <h1 class="logo">🌿 Brechó Esqueci no Cabide 👗</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="sobre.html">Sobre</a>
            <a href="login.html" class="btn-admin-link">Acessar Gestão</a>
        </nav>
    </header>

    <main>
        <h2>Nossas Peças Tropicais</h2>
        <div class="container" id="product-list">
            <!-- Produtos injetados via JS -->
        </div>
    </main>

    <!-- MODAL DE DETALHES DO PRODUTO -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeProductDetails()">&times;</span>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modal-img" src="" alt="Detalhe do Produto">
                </div>
                <div class="modal-info">
                    <h3 id="modal-title"></h3>
                    <div class="modal-meta">
                        <span id="modal-origin" class="badge"></span>
                        <span id="modal-size" class="badge"></span>
                    </div>
                    <p id="modal-price" class="card-price" style="font-size: 1.5rem; margin: 15px 0;"></p>
                    <p id="modal-quantity" style="font-size: 0.85rem; color: #888; margin-bottom: 5px;"></p>
                    <p id="modal-description" style="color: #555; line-height: 1.6; margin-bottom: 20px;"></p>
                    <p id="modal-logistics" style="font-size: 0.9rem; color: #777; margin-bottom: 25px;"></p>
                    <button id="modal-whatsapp-btn" class="btn btn-primary" style="width: 100%; padding: 15px;">Tenho Interesse</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Brechó Esqueci no Cabide - Moda Circular & Sustentável</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/main.js"></script>
</body>
</html>
