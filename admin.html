    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão - Brechó Esqueci no Cabide</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="page-admin">

    <header>
        <h1 class="logo">🌿 Painel do Gestor 👗</h1>
        <nav>
            <a href="index.html">Vitrine</a>
            <a href="admin.html" class="active">Gestão</a>
            <a href="sobre.html">Sobre</a>
            <a href="#" onclick="logout()" style="background: var(--accent-color); color: white; border-radius: 20px; padding: 8px 16px;">Sair</a>
        </nav>
    </header>

    <main>
        <h2 id="admin-title">Gestão de Estoque</h2>

        <div class="admin-nav">
            <button class="tab-btn active" onclick="openTab(event, 'tab-estoque')">📦 Estoque</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-cadastro')">➕ Novo Produto</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-relatorio')">📊 Relatório</button>
        </div>

        <!-- ABA: ESTOQUE -->
        <div id="tab-estoque" class="tab-content active">
            <div class="admin-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Tipo</th>
                            <th>Tam.</th>
                            <th>Preço</th>
                            <th>Qtd</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="admin-product-list">
                        <!-- Injetado via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ABA: CADASTRO -->
        <div id="tab-cadastro" class="tab-content">
            <div class="form-container">
                <h3 style="margin-bottom: 20px; color: var(--secondary-color);">Nova Peça Tropical</h3>
                <form id="product-form">
                    <div class="form-group">
                        <label for="title">Nome da Peça</label>
                        <input type="text" id="title" placeholder="Ex: Vestido Longo Floral" required>
                    </div>
                    <div class="form-group">
                        <label for="price">Preço (R$)</label>
                        <input type="number" id="price" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="quantity">Quantidade em Estoque</label>
                        <input type="number" id="quantity" min="1" value="1" required>
                    </div>
                    <div class="form-group">
                        <label for="origin">Tipo de Peça</label>
                        <select id="origin" required>
                            <option value="Brechó">Brechó (Circular)</option>
                            <option value="Outlet">Outlet (Novo)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="category">Categoria</label>
                        <select id="category" required>
                            <option value="Vestidos">Vestidos</option>
                            <option value="Blusas">Blusas</option>
                            <option value="Calças">Calças</option>
                            <option value="Acessórios">Acessórios</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="size">Tamanho</label>
                        <select id="size" required>
                            <option value="PP">PP</option>
                            <option value="P">P</option>
                            <option value="M">M</option>
                            <option value="G">G</option>
                            <option value="GG">GG</option>
                            <option value="Único">Único</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="description">Descrição</label>
                        <textarea id="description" rows="3" placeholder="Estado da peça, marca, etc."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="logistics">Entrega Disponível</label>
                        <select id="logistics">
                            <option value="Uber Moto">Uber Moto (Local)</option>
                            <option value="Correios">Correios (Nacional)</option>
                            <option value="Ambos">Ambos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="image-file">Foto do Produto</label>
                        <input type="file" id="image-file" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Salvar Produto</button>
                </form>
            </div>
        </div>

        <!-- ABA: RELATÓRIO -->
        <div id="tab-relatorio" class="tab-content">
            <div class="form-container">
                <h3 style="margin-bottom: 20px; color: var(--secondary-color);">Relatório de Movimentação</h3>
                <form id="report-form">
                    <div class="form-group">
                        <label for="report-filter">Filtrar por</label>
                        <select id="report-filter" required>
                            <option value="day">Dia</option>
                            <option value="week">Semana</option>
                            <option value="month">Mês</option>
                        </select>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="generateReport()">Gerar Relatório</button>
                </form>
                <div id="report-results" style="margin-top: 20px;">
                    <!-- Resultados do relatório serão inseridos aqui -->
                </div>
            </div>
        </div>

        <!-- MODAL DE EDIÇÃO DE PRODUTO -->
        <div id="edit-modal" class="modal" style="display:none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); justify-content: center; align-items: center;">
            <div class="modal-content" style="background-color: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 600px; position: relative; animation: fadeIn 0.3s ease-out;">
                <span class="close-modal" onclick="closeEditModal()" style="position: absolute; right: 20px; top: 15px; font-size: 2rem; cursor: pointer; color: #aaa;">&times;</span>
                <h3 style="margin-bottom: 20px; color: var(--secondary-color);">Editar Produto</h3>
                <form id="edit-product-form" onsubmit="saveEditProduct(event)">
                    <input type="hidden" id="edit-id">
                    <div class="form-group">
                        <label for="edit-title">Nome da Peça</label>
                        <input type="text" id="edit-title" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-price">Preço (R$)</label>
                        <input type="number" id="edit-price" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-quantity">Quantidade em Estoque</label>
                        <input type="number" id="edit-quantity" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-origin">Tipo de Peça</label>
                        <select id="edit-origin" required>
                            <option value="Brechó">Brechó (Circular)</option>
                            <option value="Outlet">Outlet (Novo)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-category">Categoria</label>
                        <select id="edit-category" required>
                            <option value="Vestidos">Vestidos</option>
                            <option value="Blusas">Blusas</option>
                            <option value="Calças">Calças</option>
                            <option value="Acessórios">Acessórios</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-size">Tamanho</label>
                        <select id="edit-size" required>
                            <option value="PP">PP</option>
                            <option value="P">P</option>
                            <option value="M">M</option>
                            <option value="G">G</option>
                            <option value="GG">GG</option>
                            <option value="Único">Único</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-description">Descrição</label>
                        <textarea id="edit-description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="edit-logistics">Entrega Disponível</label>
                        <select id="edit-logistics">
                            <option value="Uber Moto">Uber Moto (Local)</option>
                            <option value="Correios">Correios (Nacional)</option>
                            <option value="Ambos">Ambos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-image-file">Foto do Produto</label>
                        <input type="file" id="edit-image-file" accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Salvar Alterações</button>
                </form>
            </div>
        </div>

    </main>

    <footer style="text-align: center; padding: 40px; color: #888; background: #fefae0; margin-top: 50px;">
        <p>&copy; 2026 Brechó Esqueci no Cabide - Painel do Gestor</p>
    </footer

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/main.js"></script>
</body>
</html>
