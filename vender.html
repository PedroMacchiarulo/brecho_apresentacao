<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vender - Brechó Colaborativo</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="page-vender">

    <header>
        <h1 class="logo">🌿 Brechó Esqueci no Cabide 👗</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="vender.html">Vender Roupa</a>
            <a href="sobre.html">Sobre</a>
        </nav>
    </header>

    <main>
        <section class="form-container">
            <h2>Anunciar Peça</h2>
            <p>Colabore com a moda sustentável disponibilizando suas roupas.</p>
            <form id="product-form">
                <div class="form-group">
                    <label for="title">Nome da Peça</label>
                    <input type="text" id="title" placeholder="Ex: Camiseta Vintage" required>
                </div>
                <div class="form-group">
                    <label for="price">Preço (R$)</label>
                    <input type="number" id="price" step="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label for="origin">Tipo de Peça</label>
                    <select id="origin" required>
                        <option value="">Selecione...</option>
                        <option value="Brechó">Brechó (Usado/Circular)</option>
                        <option value="Outlet">Outlet (Novo/Estoque)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="category">Categoria da Roupa</label>
                    <select id="category" required>
                        <option value="">Selecione...</option>
                        <option value="Camisetas">Camisetas</option>
                        <option value="Calças">Calças</option>
                        <option value="Casacos">Casacos</option>
                        <option value="Vestidos">Vestidos</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">Descrição</label>
                    <textarea id="description" rows="4" placeholder="Descreva o estado da peça, tamanho, etc."></textarea>
                </div>
                <div class="form-group">
                    <label for="image">URL da Imagem (Link público)</label>
                    <input type="url" id="image" placeholder="https://link-da-foto.com/imagem.jpg">
                </div>
                <button type="submit" class="btn btn-primary">Publicar Anúncio</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Brechó Colaborativo - Projeto de Extensão Universitária</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
